name: Daily IPO Result Check

on:
  schedule:
    - cron: '15 10 * * *'  # 4:00 PM NPT (10:15 AM UTC) roughly when results are out
  workflow_dispatch:      # Allow manual triggering

jobs:
  check_results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: user-part-1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv psycopg2-binary firebase-admin
          # Install dependencies for CDSC CAPTCHA solving
          pip install easyocr opencv-python-headless
          playwright install chromium

      - name: Run IPO Result Check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          FIREBASE_CREDENTIALS_B64: ${{ secrets.FIREBASE_CREDENTIALS_B64 }}
          RUN_MODE: check_status
        run: python main.py
