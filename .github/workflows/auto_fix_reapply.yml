name: IPO Auto-Fix (Reapply)

on:
  schedule:
    # Reapply 1: EXACT 7:30 PM NPT (1h after Notify)
    - cron: "45 13 * * *"
    # Reapply 2: EXACT 2:30 AM NPT (1h after Notify)
    - cron: "45 20 * * *"
    # Reapply 3: EXACT 9:30 AM NPT (1h after Notify)
    - cron: "45 3 * * *"
    # Reapply 4: EXACT 12:30 PM NPT (1h after Morning Apply)
    - cron: "45 6 * * *"
  workflow_dispatch:

jobs:
  auto-fix-ipo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Auto-Reapply
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          RUN_MODE: "check_status"
          AUTO_REAPPLY: "true"
        run: |
          python main.py

      - name: Upload Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-reapply
          path: debug_*.png
