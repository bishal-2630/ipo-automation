name: Daily IPO Status Check (Official)

on:
  schedule:
    - cron: '30 11 * * *'  # 5:15 PM NPT (11:30 UTC)
  workflow_dispatch:      # Allow manual triggering

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: user-part-1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_automation.txt
          playwright install chromium

      - name: Run Status Check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          FIREBASE_CREDENTIALS_B64: ${{ secrets.FIREBASE_CREDENTIALS_B64 }}
          RUN_MODE: check_status
          HEADLESS: "true"
        run: python main.py
