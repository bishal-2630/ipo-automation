name: IPO Status Watchdog

on:
  schedule:
    # Apply runs at 11:30 AM NPT (05:45 UTC)
    # Check 1: 7h later  → 6:30 PM NPT  = 12:45 UTC
    - cron: "45 12 * * *"
    # Check 2: 14h later → 1:30 AM NPT  = 19:45 UTC
    - cron: "45 19 * * *"
    # Check 3: 21h later → 8:30 AM NPT  = 02:45 UTC
    - cron: "45 2 * * *"
  workflow_dispatch:
    inputs:
      live_debug:
        description: 'Enable Live Debug Mode (Watch browser live via VNC)'
        required: false
        type: boolean
        default: false

jobs:
  check-ipo-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Status Watchdog
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_BASE_TOPIC: ${{ secrets.MQTT_BASE_TOPIC }}
          RUN_MODE: "check_status"
        run: |
          python main.py

      - name: Setup GUI for Live Debug
        if: github.event.inputs.live_debug == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc tmate
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          x11vnc -display :99 -forever -nopw -bg -rfbport 5900
          # noVNC setup
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080 &
          echo "GUI Environment started on DISPLAY :99"
          echo "VNC on port 5900, noVNC on port 6080"

      - name: Run Status Watchdog
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_BASE_TOPIC: ${{ secrets.MQTT_BASE_TOPIC }}
          RUN_MODE: "check_status"
          HEADLESS: ${{ github.event.inputs.live_debug != 'true' }}
          DISPLAY: ":99"
        run: |
          if [ "${{ github.event.inputs.live_debug }}" == "true" ]; then
            echo "🚀 LIVE DEBUG MODE ENABLED"
            echo "1. Connect to tmate: https://tmate.io/"
            echo "Wait... Starting tmate for tunnel..."
            tmate -S /tmp/tmate.sock new-session -d
            tmate -S /tmp/tmate.sock wait tmate-ready
            TMATE_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
            echo "----------------------------------------------------------------"
            echo "VISUAL DEBUG LINK: $TMATE_URL"
            echo "Once in tmate terminal, run: 'python main.py'"
            echo "Then open a local terminal and run: 'ssh -L 6080:localhost:6080 <tmate_ssh_string>'"
            echo "Then visit http://localhost:6080/vnc.html in your browser."
            echo "----------------------------------------------------------------"
            # Keep alive for user interaction
            tmate -S /tmp/tmate.sock wait tmate-ready
            sleep 300
          else
            python main.py
          fi

      - name: Upload Debug Artifacts (Screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-debug-artifacts
          path: |
            debug_*.png
            *.png
          retention-days: 3
