name: IPO Status Watchdog

on:
  schedule:
    # Apply runs at 11:30 AM NPT (05:45 UTC)
    # Check 1: 7h later  → 6:30 PM NPT  = 12:45 UTC
    - cron: "45 12 * * *"
    # Check 2: 14h later → 1:30 AM NPT  = 19:45 UTC
    - cron: "45 19 * * *"
    # Check 3: 21h later → 8:30 AM NPT  = 02:45 UTC
    - cron: "45 2 * * *"
  workflow_dispatch:
    inputs:
      live_debug:
        description: 'Enable Live Debug Mode (Watch browser live via VNC)'
        required: false
        type: boolean
        default: false

jobs:
  check-ipo-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Setup GUI and Live Tunnel
        if: github.event.inputs.live_debug == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc x11-utils
          # Install Cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          
          # Wait for Xvfb to be ready
          echo "Waiting for Xvfb..."
          for i in {1..10}; do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 1
          done
          
          x11vnc -display :99 -forever -nopw -bg -rfbport 5900
          
          # noVNC setup using websockify directly (Ubuntu 24.04 path)
          websockify --web=/usr/share/novnc/ 6080 localhost:5900 &
          
          # Cloudflare Tunnel setup
          echo "----------------------------------------------------------------"
          echo "🚀 STARTING LIVE VIDEO TUNNEL..."
          cloudflared tunnel --url http://localhost:6080/vnc.html --no-autoupdate > cloudflare.log 2>&1 &
          
          # Wait and extract URL from logs
          sleep 5
          CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cloudflare.log | head -n 1)
          echo "----------------------------------------------------------------"
          echo "VISUAL DEBUG LINK: $CF_URL"
          echo "----------------------------------------------------------------"
          echo "GUI Environment started on DISPLAY :99"

      - name: Run Status Watchdog
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_BASE_TOPIC: ${{ secrets.MQTT_BASE_TOPIC }}
          RUN_MODE: "check_status"
          HEADLESS: ${{ github.event.inputs.live_debug != 'true' }}
          DISPLAY: ":99"
        run: |
          if [ "${{ github.event.inputs.live_debug }}" == "true" ]; then
            echo "🚀 LIVE DEBUG MODE ENABLED"
            python main.py
            sleep 60
          else
            python main.py
          fi

      - name: Upload Debug Artifacts (Screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-debug-artifacts
          path: |
            debug_*.png
            *.png
          retention-days: 3
