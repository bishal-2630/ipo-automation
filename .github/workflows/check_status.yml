name: IPO Status Watchdog

on:
  schedule:
    # Check 1: EXACT 6:30 PM NPT (Notify Only)
    - cron: "45 12 * * *"
    # Check 2: EXACT 1:30 AM NPT (Notify Only)
    - cron: "45 19 * * *"
    # Check 3: EXACT 8:30 AM NPT (Notify Only)
    - cron: "45 2 * * *"
  workflow_dispatch:

jobs:
  check-ipo-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Status Watchdog
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          RUN_MODE: "check_status"
          AUTO_REAPPLY: "false"
        run: |
          python main.py
