name: Sync to Hugging Face Space
on:
  push:
    branches: [user-part-1]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://token:$HF_TOKEN@huggingface.co/spaces/bishal-2630/ipo-automation user-part-1:main
