name: Secondary Market Listing Check

on:
  schedule:
    - cron: '45 5 * * *'  # 11:30 AM NPT (05:45 UTC) daily
  workflow_dispatch:        # Allow manual triggering

jobs:
  check-listing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: user-part-1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv psycopg2-binary firebase-admin
          playwright install chromium

      - name: Run Listing Scrapper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_CREDENTIALS_B64: ${{ secrets.FIREBASE_CREDENTIALS_B64 }}
        run: python scrapper_listing.py

      - name: Commit Cache Update
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add notified_listings.txt || true
          git add last_listing_headline.txt || true
          git commit -m "chore: update listing cache [skip ci]" || true
          git push origin user-part-1 || true
