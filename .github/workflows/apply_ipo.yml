name: IPO Automation Daily

on:
  schedule:
    # Runs at 10:00 AM Nepal Time (UTC +5:45) => approx 4:15 AM UTC
    - cron: '15 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  apply-ipo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Tesseract OCR)
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr libtesseract-dev

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium

    - name: Run IPO Automation Script
      env:
        # We now use a single JSON secret for multiple accounts
        # If this is empty, the script will look for individual env vars (backward compatibility)
        ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
      run: |
        python main.py

    - name: Upload Debug Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: "*.png"
        retention-days: 1
