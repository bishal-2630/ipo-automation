name: Daily IPO Application Check

on:
  schedule:
    - cron: '30 10 * * *'  # 4:15 PM NPT (10:30 UTC)
  workflow_dispatch:      # Allow manual triggering only

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv psycopg2-binary firebase-admin
          playwright install chromium

      - name: Run IPO Automation Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Pass other needed secrets if any
        run: python run_github_automation.py
